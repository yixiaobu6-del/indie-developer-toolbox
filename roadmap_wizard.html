<link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:linear-gradient(135deg, #0f172a 0%, #1e293b 100%); min-height:100vh; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif; color:#e2e8f0; }

.step-indicator { position:relative; display:flex; justify-content:center; gap:0; }
.step-dot { width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:600; transition:all .3s; position:relative; z-index:2; }
.step-dot.active { background:#6366f1; color:white; box-shadow:0 0 20px rgba(99,102,241,0.4); }
.step-dot.completed { background:#10b981; color:white; }
.step-dot.pending { background:#334155; color:#64748b; }
.step-line { flex:1; height:2px; align-self:center; transition:all .3s; }
.step-line.completed { background:#10b981; }
.step-line.pending { background:#334155; }

.product-card { cursor:pointer; transition:all .3s; border:2px solid transparent; }
.product-card:hover { border-color:#6366f1; transform:translateY(-3px); box-shadow:0 10px 30px rgba(99,102,241,0.15); }
.product-card.selected { border-color:#6366f1; background:rgba(99,102,241,0.08); }

.card-glow { position:relative; overflow:hidden; }
.card-glow::before { content:''; position:absolute; top:-50%; left:-50%; width:200%; height:200%; background:radial-gradient(circle,rgba(99,102,241,0.05) 0%,transparent 60%); opacity:0; transition:opacity .5s; }
.card-glow:hover::before { opacity:1; }

.wizard-step { display:none; animation:fadeIn .4s ease; }
.wizard-step.active { display:block; }
@keyframes fadeIn { from { opacity:0; transform:translateY(15px); } to { opacity:1; transform:translateY(0); } }

.tech-badge { display:inline-flex; align-items:center; gap:4px; padding:4px 12px; background:rgba(99,102,241,0.1); border:1px solid rgba(99,102,241,0.2); border-radius:20px; font-size:13px; color:#a5b4fc; cursor:pointer; transition:all .2s; }
.tech-badge:hover { background:rgba(99,102,241,0.2); }
.tech-badge.selected { background:rgba(99,102,241,0.3); border-color:#6366f1; color:#c7d2fe; }

.milestone-dot { width:14px; height:14px; border-radius:50%; flex-shrink:0; margin-top:4px; }

.todo-item { display:flex; align-items:start; gap:10px; padding:10px; border-radius:8px; transition:all .2s; }
.todo-item:hover { background:rgba(99,102,241,0.05); }
.todo-item.done .todo-text { text-decoration:line-through; color:#64748b; }
.todo-check { width:18px; height:18px; border:2px solid #475569; border-radius:4px; cursor:pointer; flex-shrink:0; margin-top:2px; transition:all .2s; display:flex; align-items:center; justify-content:center; }
.todo-check:hover { border-color:#6366f1; }
.todo-check.checked { background:#6366f1; border-color:#6366f1; color:white; font-size:11px; }

.scrollbar-thin::-webkit-scrollbar { width:4px; }
.scrollbar-thin::-webkit-scrollbar-track { background:transparent; }
.scrollbar-thin::-webkit-scrollbar-thumb { background:#475569; border-radius:2px; }

.progress-bar { height:4px; background:#334155; border-radius:2px; overflow:hidden; }
.progress-bar-fill { height:100%; background:linear-gradient(90deg,#6366f1,#818cf8); border-radius:2px; transition:width .5s ease; }
</style>
</head>
<body>

<div class="max-w-5xl mx-auto p-4">
  <!-- 头部 -->
  <header class="text-center mb-8 pt-4">
    <h1 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-purple-400">
      <i class="fa fa-rocket mr-2"></i>独立开发者产品路线图向导
    </h1>
    <p class="text-slate-400 mt-2 text-sm">从 0 到 1，一步步打造你的独立产品</p>
    <div class="progress-bar mt-4 max-w-md mx-auto">
      <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
    </div>
  </header>

  <!-- 步骤指示器 -->
  <div class="flex items-center max-w-2xl mx-auto mb-8 px-4" id="stepIndicator">
    <div class="step-dot active" id="stepDot0">1</div>
    <div class="step-line pending" id="stepLine0"></div>
    <div class="step-dot pending" id="stepDot1">2</div>
    <div class="step-line pending" id="stepLine1"></div>
    <div class="step-dot pending" id="stepDot2">3</div>
    <div class="step-line pending" id="stepLine2"></div>
    <div class="step-dot pending" id="stepDot3">4</div>
  </div>

  <!-- 第1步：选择产品类型 -->
  <div class="wizard-step active" id="step0">
    <div class="text-center mb-6">
      <h2 class="text-2xl font-bold text-white"><i class="fa fa-cube mr-2 text-indigo-400"></i>选择产品类型</h2>
      <p class="text-slate-400 text-sm mt-1">你的产品属于哪种形态？</p>
    </div>
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4" id="productGrid"></div>
    <div class="text-center mt-6">
      <button onclick="nextStep()" id="step0Next" class="px-6 py-3 rounded-xl bg-indigo-600 text-white hover:bg-indigo-500 font-medium disabled:opacity-30 disabled:cursor-not-allowed" disabled><i class="fa fa-arrow-right mr-2"></i>下一步</button>
    </div>
  </div>

  <!-- 第2步：技术栈选择 -->
  <div class="wizard-step" id="step1">
    <div class="text-center mb-6">
      <h2 class="text-2xl font-bold text-white"><i class="fa fa-code mr-2 text-indigo-400"></i>选择技术栈</h2>
      <p class="text-slate-400 text-sm mt-1">根据你的产品类型，推荐以下技术方案</p>
    </div>
    <div id="techStackArea" class="space-y-4"></div>
    <div class="text-center mt-6 flex gap-3 justify-center">
      <button onclick="prevStep()" class="px-4 py-3 rounded-xl bg-slate-700 text-slate-300 hover:bg-slate-600 font-medium"><i class="fa fa-arrow-left mr-2"></i>上一步</button>
      <button onclick="nextStep()" class="px-6 py-3 rounded-xl bg-indigo-600 text-white hover:bg-indigo-500 font-medium"><i class="fa fa-arrow-right mr-2"></i>下一步</button>
    </div>
  </div>

  <!-- 第3步：商业模式 -->
  <div class="wizard-step" id="step2">
    <div class="text-center mb-6">
      <h2 class="text-2xl font-bold text-white"><i class="fa fa-money mr-2 text-indigo-400"></i>选择商业模式</h2>

    </div>
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4" id="bizModelGrid"></div>
    <div class="text-center mt-6 flex gap-3 justify-center">
      <button onclick="prevStep()" class="px-4 py-3 rounded-xl bg-slate-700 text-slate-300 hover:bg-slate-600 font-medium"><i class="fa fa-arrow-left mr-2"></i>上一步</button>
      <button onclick="nextStep()" class="px-6 py-3 rounded-xl bg-indigo-600 text-white hover:bg-indigo-500 font-medium"><i class="fa fa-arrow-right mr-2"></i>生成路线图</button>
    </div>
  </div>

  <!-- 第4步：结果 -->
  <div class="wizard-step" id="step3">
    <div class="text-center mb-6">
      <h2 class="text-2xl font-bold text-white"><i class="fa fa-road mr-2 text-indigo-400"></i>你的产品路线图</h2>
      <p class="text-slate-400 text-sm mt-1">根据你的选择，为你量身定制了以下计划</p>
    </div>
    <div class="space-y-6" id="resultArea"></div>
    <div class="text-center mt-6 flex gap-3 justify-center flex-wrap">
      <button onclick="prevStep()" class="px-4 py-3 rounded-xl bg-slate-700 text-slate-300 hover:bg-slate-600 font-medium"><i class="fa fa-arrow-left mr-2"></i>返回修改</button>

      <button onclick="openCompetitorAnalysis()" class="px-5 py-3 rounded-xl bg-amber-600 text-white hover:bg-amber-500 font-medium"><i class="fa fa-binoculars mr-2"></i>竞品分析</button>
      <button onclick="exportMarkdown()" class="px-5 py-3 rounded-xl bg-blue-600 text-white hover:bg-blue-500 font-medium"><i class="fa fa-download mr-2"></i>导出 Markdown</button>
      <button onclick="resetAll()" class="px-4 py-3 rounded-xl bg-rose-600 text-white hover:bg-rose-500 font-medium"><i class="fa fa-refresh mr-2"></i>重新开始</button>
    </div>
  </div>
</div>

<!-- 新增：成本估算器模态框 -->
<div id="costModal" class="fixed inset-0 bg-black/60 flex items-center justify-center z-50 hidden" style="backdrop-filter:blur(4px);">

          <option value="3">3-5人（小团队）</option>

        </select>
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-300 mb-1">开发周期（月）</label>
        <select id="costDuration" class="w-full bg-slate-700 border border-slate-600 rounded px-3 py-2 text-white">
          <option value="1">1个月</option>
          <option value="2">2个月</option>
          <option value="3">3个月</option>
          <option value="6">6个月</option>
          <option value="12">12个月+</option>
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-300 mb-1">技术栈复杂度</label>
        <select id="costComplexity" class="w-full bg-slate-700 border border-slate-600 rounded px-3 py-2 text-white">
          <option value="low">低（简单前端+基础后端）</option>
          <option value="medium">中（前后端+数据库+API集成）</option>
          <option value="high">高（微服务+AI+实时通信+多端）</option>
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-300 mb-1">地区/人力成本</label>

          <option value="seasia">东南亚</option>
          <option value="europe">欧洲/北美</option>
        </select>
      </div>
    </div>
    <button onclick="estimateCost()" class="w-full bg-emerald-600 text-white py-3 rounded-lg hover:bg-emerald-500 font-bold"><i class="fa fa-calculator mr-2"></i>估算成本</button>
    <div id="costResult" class="mt-4 hidden"></div>
  </div>
</div>

    </div>
    <div id="competeResult"></div>

</div>

// ============================================================
// 选择操作
// ============================================================
function selectProduct(id) {
  currentState.product = id;
  currentState.bizModel = null;
  currentState.techSelections = {};
  renderProducts();
  document.getElementById('step0Next').disabled = false;
  saveProgress();
}

function selectBizModel(name) {
  currentState.bizModel = name;
  renderBizModels();
  saveProgress();
}

function selectTech(category, option) {
  if (!currentState.techSelections[category]) currentState.techSelections[category] = [];
  const arr = currentState.techSelections[category];
  const idx = arr.indexOf(option);
  if (idx >= 0) arr.splice(idx, 1);
  else arr.push(option);
  renderTechStacks();
  saveProgress();
}

// ============================================================
// 步骤导航
// ============================================================
function nextStep() {
  if (currentState.step === 0 && !currentState.product) { alert('请先选择产品类型'); return; }
  // 准备第2步数据
  if (currentState.step === 1) prepareTechStacks();
  // 生成第4步结果
  if (currentState.step === 2) generateResult();
  if (currentState.step < 3) {
    currentState.step++;
    updateStepUI();
    saveProgress();
  }
}

function prevStep() {
  if (currentState.step > 0) {
    currentState.step--;
    updateStepUI();
    saveProgress();
  }
}

function updateStepUI() {
  document.querySelectorAll('.wizard-step').forEach((el, i) => {
    el.classList.toggle('active', i === currentState.step);
  });
  for (let i = 0; i < 4; i++) {
    const dot = document.getElementById(`stepDot${i}`);
    const line = document.getElementById(`stepLine${i}`);
    if (dot) {
      dot.className = `step-dot ${i < currentState.step ? 'completed' : i === currentState.step ? 'active' : 'pending'}`;
      dot.innerHTML = i < currentState.step ? '<i class="fa fa-check"></i>' : i + 1;
    }
    if (line) {
      line.className = `step-line ${i < currentState.step ? 'completed' : 'pending'}`;
    }
  }
  const progress = ((currentState.step) / 3) * 100;
  document.getElementById('progressFill').style.width = `${progress}%`;
}

function exportMarkdown() {
  const product = PRODUCT_TYPES.find(p => p.id === currentState.product);

  const selectedTechs = Object.entries(currentState.techSelections)
    .filter(([_, v]) => v.length > 0)

  const doneTodos = currentState.todoItems.filter(t => t.done).length;

  let md = `# 独立产品路线图\n\n`;
  md += `> 生成时间：${new Date().toLocaleString()}\n\n`;
  md += `## 产品概览\n\n`;
  md += `- **产品类型**：${product.name}\n`;
  md += `- **商业模式**：${currentState.bizModel || '未选择'}\n`;
  md += `- **待完成项**：${doneTodos}/${currentState.todoItems.length}\n\n`;

  if (selectedTechs) {
    md += `## 技术栈\n\n${selectedTechs}\n\n`;
  }

  md += `## 里程碑\n\n`;
  product.milestones.forEach(m => {
    md += `### ${m.period}：${m.title}\n\n`;
    m.tasks.forEach(t => md += `- [ ] ${t}\n`);
    md += '\n';
  });

  md += `## Todo 清单\n\n`;
  currentState.todoItems.forEach(t => {
    md += `- [${t.done ? 'x' : ' '}] [${t.milestone}] ${t.task}\n`;
  });

  md += `\n## 关键建议\n\n`;
  md += `1. 先做最小可行产品（MVP），不要过度设计\n`;
  md += `2. 尽早获取真实用户反馈，快速迭代\n`;
  md += `3. 先验证付费意愿，再投入大规模开发\n`;
  md += `4. 保持独立，控制成本，避免过早融资\n`;
  md += `5. 建立个人品牌，内容营销是独立开发者最好的获客方式\n`;

  const blob = new Blob([md], { type: 'text/markdown;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `产品路线图_${product.name}_${new Date().toISOString().slice(0, 10)}.md`;
  a.click();
  URL.revokeObjectURL(url);
  addToast('已导出 Markdown 文件');
}

// ============================================================
function saveProgress() {
  try {
    localStorage.setItem('roadmapWizard', JSON.stringify(currentState));
  } catch(e) {}
}

function loadProgress() {
  try {
    const saved = localStorage.getItem('roadmapWizard');
    if (saved) {
      const data = JSON.parse(saved);
      Object.assign(currentState, data);
      if (currentState.step > 0) {
        updateStepUI();
        if (currentState.step >= 1) renderTechStacks();
        if (currentState.step >= 2) renderBizModels();
        if (currentState.step >= 3) generateResult();
      }
    }
  } catch(e) {}
}

function resetAll() {
  if (!confirm('确定要重新开始吗？当前进度将被清除。')) return;
  currentState.step = 0;
  currentState.product = null;
  currentState.techSelections = {};
  currentState.bizModel = null;
  currentState.todoItems = [];
  localStorage.removeItem('roadmapWizard');
  updateStepUI();
  renderProducts();
  document.getElementById('step0Next').disabled = true;
  addToast('已重置进度');
}

const COST_DATA = {
  china: { dev: 15000, designer: 12000, pm: 18000, ops: 10000 },
  seasia: { dev: 8000, designer: 6000, pm: 10000, ops: 5000 },
  europe: { dev: 50000, designer: 40000, pm: 60000, ops: 35000 }
};
const COMPLEXITY_MULTIPLIER = { low: 1, medium: 1.5, high: 2.2 };

function openCostEstimator() {
  document.getElementById('costResult').classList.add('hidden');
  document.getElementById('costModal').classList.remove('hidden');
}

function closeModal(id) {
  document.getElementById(id).classList.add('hidden');
}

document.addEventListener('click', function(e) {
  ['costModal','competeModal'].forEach(function(id) {
    var el = document.getElementById(id);
    if (e.target === el) el.classList.add('hidden');
  });
});

function estimateCost() {
  var teamSize = parseInt(document.getElementById('costTeamSize').value);
  var duration = parseInt(document.getElementById('costDuration').value);
  var complexity = document.getElementById('costComplexity').value;
  var region = document.getElementById('costRegion').value;

  var rates = COST_DATA[region];
  var mult = COMPLEXITY_MULTIPLIER[complexity];
  var headcount = Math.max(1, Math.ceil(teamSize * 0.7));
  var monthlyCost = (rates.dev * headcount * 0.6 + rates.designer * Math.ceil(headcount * 0.15) + rates.pm * Math.ceil(headcount * 0.15) + rates.ops * Math.ceil(headcount * 0.1)) * mult;
  var totalCost = monthlyCost * duration;

  var regionLabels = { china: '中国大陆', seasia: '东南亚', europe: '欧洲/北美' };
  var complexityLabels = { low: '低复杂度', medium: '中复杂度', high: '高复杂度' };
  var costItems = [
    { name: '开发工程师', count: Math.ceil(headcount * 0.6), rate: rates.dev },
    { name: '设计师', count: Math.ceil(headcount * 0.15), rate: rates.designer },
    { name: '项目经理', count: Math.ceil(headcount * 0.15), rate: rates.pm },
    { name: '运维/运营', count: Math.ceil(headcount * 0.1), rate: rates.ops }
  ];

  var el = document.getElementById('costResult');
  el.classList.remove('hidden');
  el.innerHTML = '<div class="bg-slate-700/50 rounded-lg p-4 mt-4 space-y-3">' +
    '<div class="text-center pb-3 border-b border-slate-600">' +
      '<div class="text-3xl font-bold text-emerald-400">¥' + Math.round(totalCost).toLocaleString() + '</div>' +
      '<div class="text-xs text-slate-400">预估总成本（' + duration + '个月）</div>' +
    '</div>' +
    '<div class="text-sm text-slate-300 space-y-1">' +
      '<div class="flex justify-between"><span>团队规模</span><span>' + teamSize + '人</span></div>' +
      '<div class="flex justify-between"><span>技术复杂度</span><span>' + complexityLabels[complexity] + '</span></div>' +
      '<div class="flex justify-between"><span>地区</span><span>' + regionLabels[region] + '</span></div>' +
      '<div class="flex justify-between"><span>月均成本</span><span>¥' + Math.round(monthlyCost).toLocaleString() + '</span></div>' +
    '</div>' +
    '<div class="border-t border-slate-600 pt-3">' +
      '<div class="text-xs font-bold text-slate-400 mb-2">人员成本明细（月）</div>' +
      costItems.map(function(item) { return '<div class="flex justify-between text-xs text-slate-400"><span>' + item.name + ' x' + item.count + '</span><span>¥' + (item.rate * item.count).toLocaleString() + '</span></div>'; }).join('') +
    '</div>' +
    '<div class="text-xs text-amber-400 bg-amber-900/20 p-3 rounded mt-2">' +
      '<i class="fa fa-info-circle mr-1"></i>此为粗略估算，实际成本因具体需求、工具成本等因素浮动' +
    '</div></div>';
}

    el.innerHTML = '<div class="text-center text-slate-400 py-8"><i class="fa fa-info-circle fa-2x mb-2"></i><p>' + (COMPETITOR_CATEGORIES[productId] || '该类型') + ' 的竞品数据准备中</p></div>';
  } else {
    el.innerHTML = '<div class="mb-4"><div class="text-sm text-slate-400 mb-1">产品类型：' + (COMPETITOR_CATEGORIES[productId] || '未知') + '</div><h4 class="text-white font-bold text-lg">推荐竞品</h4></div>' +
      '<div class="space-y-3 mb-4">' +
      compete.competitors.map(function(c) {
        return '<div class="bg-slate-700/50 rounded-lg p-4 border border-slate-600">' +
          '<div class="flex justify-between items-start mb-2">' +
            '<div><span class="font-bold text-white">' + c.name + '</span><span class="text-xs text-slate-400 ml-2">' + c.type + '</span></div>' +
            '<span class="text-xs bg-amber-900/30 text-amber-400 px-2 py-0.5 rounded">' + c.price + '</span>' +
          '</div>' +
          '<div class="grid grid-cols-2 gap-2 text-xs">' +
            '<div><span class="text-emerald-400">优势：</span><span class="text-slate-400">' + c.strength + '</span></div>' +
            '<div><span class="text-red-400">劣势：</span><span class="text-slate-400">' + c.weakness + '</span></div>' +
          '</div></div>';
      }).join('') +
      '</div>' +
      '<div class="bg-indigo-900/30 rounded-lg p-4 border border-indigo-700/30">' +
        '<h4 class="font-bold text-indigo-400 mb-2 text-sm"><i class="fa fa-bar-chart mr-1"></i>分析维度建议</h4>' +
        '<div class="flex flex-wrap gap-2">' +
          compete.dimensions.map(function(d) { return '<span class="px-3 py-1 bg-indigo-900/40 text-indigo-300 rounded-full text-xs border border-indigo-700/30">' + d + '</span>'; }).join('') +
        '</div>' +
        '<p class="text-xs text-slate-400 mt-3">建议从以上维度对竞品进行系统对比，找出差异化空间和竞争壁垒。</p></div>';
  }
  document.getElementById('competeModal').classList.remove('hidden');
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
